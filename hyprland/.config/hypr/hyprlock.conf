# Hyprlock configuration

background {
    monitor =
    path = /home/johnwink/imgs/desktop/advanced.png
    blur_passes = 2
    blur_size = 6
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    hide_cursor = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = sans-serif
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %B %d')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 20
    font_family = sans-serif
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(51, 204, 255, 0.8)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.9)
    font_family = sans-serif
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}
