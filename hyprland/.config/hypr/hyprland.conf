# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = hyprlauncher
$browser = firefox


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
exec-once = waybar
exec-once = hyprpaper
exec-once = ~/scripts/wallpaper-restore.sh
exec-once = hypridle
exec-once = hyprlauncher --daemon
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XDG_SESSION_TYPE XDG_SESSION_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = dunst
exec-once = fcitx5



#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XMODIFIERS,@im=fcitx
# env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
env = TERMINAL,kitty
env = LOCK_CMD,hyprlock



#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 8

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
#    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
    allow_small_split = true
    mfact = 0.5
    smart_resizing = true
}

# See https://wiki.hypr.land/Configuring/Scrolling-Layout/ for more
scrolling {
    fullscreen_on_one_column = true
    column_width = 0.8
    focus_fit_method = 0
    follow_focus = true
    follow_min_visible = 0.4
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
    direction = right
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(mpv|imv|feh|viewnior|eog|qview|sxiv|nsxiv)$
    vrr = 2
    initial_workspace_tracking = 0
}


xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = false
}

debug {
    disable_logs = true
    disable_time = false
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 3
    no_hardware_cursors = false
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, loginctl kill-session $XDG_SESSION_ID
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, hyprlauncher --toggle
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, O, exec, obsidian

# Scrolling layout controls
bind = $mainMod, i, layoutmsg, colresize +conf
bind = $mainMod SHIFT, i, layoutmsg, colresize -conf
bind = $mainMod, bracketleft, layoutmsg, orientationleft # horizontal split
bind = $mainMod, bracketright, layoutmsg, orientationright # vertical split
bind = $mainMod, semicolon, layoutmsg, orientationnext # cycle orientation
bind = $mainMod SHIFT, x, exec, hyprlock
bind = $mainMod, X, exec, wlogout
bind = $mainMod, b, exec, $browser
bind = $mainMod SHIFT, w, exec, ~/scripts/wallpaper-cycle.sh
bind = $mainMod, U, exec, killall -SIGUSR1 waybar

# Window cycling - SUPER+Tab (like alt-tab)
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev

# Vim-style window focus - SUPER+H/J/K/L
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Vim-style window resize - SUPER+CTRL+H/J/K/L
binde = $mainMod CTRL, h, resizeactive, -40 0
binde = $mainMod CTRL, l, resizeactive, 40 0
binde = $mainMod CTRL, k, resizeactive, 0 -40
binde = $mainMod CTRL, j, resizeactive, 0 40

binde = $mainMod ALT, h, moveactive, -80 0
binde = $mainMod ALT, l, moveactive, 80 0
binde = $mainMod ALT, k, moveactive, 0 -80
binde = $mainMod ALT, j, moveactive, 0 80

# Vim-style window swap (works in any layout, incl. scrolling) - SUPER+SHIFT+H/J/K/L
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

# Move focus with arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, s, exec, ~/.local/bin/screenshot area
bind = $mainMod SHIFT, M, exec, ~/.local/bin/move-to-magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.local/bin/brightness-up
bindel = ,XF86MonBrightnessDown, exec, ~/.local/bin/brightness-down

# Custom volume/brightness controls
bind = CTRL ALT, equal, exec, ~/.local/bin/vol-up
bind = CTRL ALT, minus, exec, ~/.local/bin/vol-down
bind = CTRL ALT SHIFT, equal, exec, ~/.local/bin/brightness-up
bind = CTRL ALT SHIFT, minus, exec, ~/.local/bin/brightness-down

bind = $mainMod, F10, exec, ~/.local/bin/vol-down
bind = $mainMod, F11, exec, ~/.local/bin/vol-up
bind = $mainMod, F12, exec, ~/.local/bin/brightness-up
bind = $mainMod, F9, exec, ~/.local/bin/brightness-down

# Screenshot
bind = $mainMod SHIFT, f, exec, ~/.local/bin/screenshot full

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland — only apply to tiny helper windows
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
#    match:size = <10 <10

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = hyprland-run
    match:class = ^(hyprland-run)$
    float = true
}

# Waybar transparency
windowrule {
    name = waybar-opacity
    match:class = ^(waybar)$
    opacity = 0.85
}

# Wofi floating popup
windowrule {
    name = wofi-float
    match:class = wofi
    pin = true
}

# Matplotlib figure auto-float
windowrule {
    name = matplotlib-float
    match:title = ^Figure.*
    float = true
}

# GPG / SSH / PIN entry dialogs
windowrule {
    name = pinentry-float
    match:title = ^PIN entry.*$
    float = true
    center = true
}

windowrule {
    name = pinentry-gtk-float
    match:class = ^pinentry-gtk-2$
    float = true
    center = true
}

windowrule {
    name = pinentry-qt-float
    match:class = ^pinentry-qt$
    float = true
    center = true
}

# Steam
windowrule {
    name = steam-float
    match:title = ^Steam$
    float = true
}

windowrule {
    name = steam-settings
    match:title = ^(Settings|Steam Settings)$
    float = true
}

# Bluetooth pairing
windowrule {
    name = bluetooth-float
    match:title = ^Bluetooth.*$
    float = true
    center = true
    size = 600, 500
}

# Pavucontrol / audio mixer
windowrule {
    name = pavucontrol-float
    match:class = ^pavucontrol$
    float = true
}

# Firefox picture-in-picture
windowrule {
    name = firefox-pip
    match:class = ^firefox$
    match:title = ^(Picture-in-Picture|PiP).*$
    float = true
    pin = true
    workspace = special:magic
}

# GTK file dialogs
windowrule {
    name = gtk-dialog-center
    match:class = ^GtkFileChooserDialog$
    center = true
}


