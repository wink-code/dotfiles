font_family JetBrainsMono Nerd Font
font_features +calt +liga +onum
symbol_map U+1F000-U+1F02F,U+1F0A0-U+1F0FF,U+1F100-U+1F1FF,U+1F200-U+1F2FF,U+1F300-U+1F3FF,U+1F400-U+1F4FF,U+1F500-U+1F5FF,U+1F600-U+1F6FF,U+1F700-U+1F7FF,U+1F800-U+1F8FF,U+1F900-U+1F9FF,U+1FA00-U+1FAFF,U+1FB00-U+1FBFF,U+2190-U+2199,U+21A9-U+21AB,U+25FD-U+25FE Noto Color Emoji
symbol_map U+23FB-U+23FE,U+2B58,U+E200-U+E2A9,U+E0A0-U+E0A3,U+E0B0-U+E0BF,U+E0C0-U+E0C8,U+E0CC-U+E0CF,U+E0D0-U+E0D2,U+E0D4,U+E700-U+F7C5,U+F000-U+F2E0,U+F300-U+F31C,U+F400-U+F4A9,U+F500-U+F8FF Symbols Nerd Font Mono

env = LC_ALL=en_US.UTF-8
env = LANG=en_US.UTF-8
term xterm-kitty

# Wayland / IME
linux_display_server wayland
ime_policy hidden

font_size 12.0
font_features none
adjust_column_width 0
adjust_line_height 0

# 内边距 — 让文字不贴边
window_padding_width 12
hide_window_decorations no

# 透明度 (毛玻璃效果依赖 Hyprland blur)
background_opacity 0.80
dynamic_background_opacity yes

# 光标
cursor_shape beam
cursor_blink_interval 0.5
cursor_trail 0
cursor_trail_decay 0.1 0.4

# 选择
selection_foreground #222436
selection_background #86e1fc
url_color #4fd6be
url_style curly

# 滚动
scrollback_lines 10000
scrollback_pager_history_size 0
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# Tab 栏
tab_bar_style powerline
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_background #1b1d2b
tab_separator ""
active_tab_foreground #1e2030
active_tab_background #82aaff
active_tab_font_style bold-italic
inactive_tab_foreground #545c7e
inactive_tab_background #2f334d
inactive_tab_font_style normal

# 窗格边框
active_border_color #82aaff
inactive_border_color #2f334d
visual_bell_duration 0.5
window_alert_on_bell no
bell_on_tab yes
confirm_os_window_close 0

# 快捷键
map shift+left send_text all \x1b[1;5D
map shift+right send_text all \x1b[1;5C
map ctrl+backspace send_text all \x1b[W
map ctrl+shift+z toggle fullscreen
map ctrl+shift+o toggle_layout stack
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# 性能
sync_to_monitor yes
repaint_defer 2
compose_key_enabled no
visual_bell_duration 0.0

# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME
